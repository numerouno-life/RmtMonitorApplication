stages:
  - check
  - build
  - test
  - deploy
  - notify

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"

cache:
  paths:
    - .m2/repository/
    - target/
  key: $CI_COMMIT_REF_SLUG

# -------------------------------
# Шаг 0 — Проверка переменных
check-vars:
  stage: check
  image: alpine:latest
  script:
    - '[ -n "$TG_BOT_TOKEN" ] && echo "TG_BOT_TOKEN is set" || echo "❌ TG_BOT_TOKEN is missing"'
    - '[ -n "$TG_CHAT_ID" ] && echo "TG_CHAT_ID is set" || echo "❌ TG_CHAT_ID is missing"'
  allow_failure: false

# -------------------------------
# Шаг 0.1 — Тест Telegram бота
test-telegram-bot:
  stage: check
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - |
      if [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
        curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
          -d chat_id="$TG_CHAT_ID" \
          -d text="💬 Тестовое сообщение из GitLab CI. Telegram бот работает!"
        echo "✅ Сообщение отправлено"
      else
        echo "❌ Переменные TG_BOT_TOKEN или TG_CHAT_ID не заданы"
        exit 1
      fi
  allow_failure: false
  needs:
    - check-vars

# -------------------------------
# Шаг 1 — Проверка стиля кода
code_quality:
  stage: check
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS spotless:check
    - mvn $MAVEN_CLI_OPTS checkstyle:check
  allow_failure: false

# -------------------------------
# Шаг 2 — Сборка
build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 week
  needs:
    - code_quality
    - test-telegram-bot

# -------------------------------
# Шаг 3 — Тестирование
test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS test
  needs:
    - build

# -------------------------------
# Шаг 4 — Деплой
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client curl
  script:
    - VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
    - echo "🚀 Деплой версии $VERSION"
    - scp -o StrictHostKeyChecking=no target/*.jar user@server:/deploy/
  only:
    - main
  when: manual
  needs:
    - test

# -------------------------------
# Шаг 5 — Уведомления
notify:
  stage: notify
  image: alpine:latest
  script:
    - if [ "$CI_JOB_STATUS" = "success" ]; then
      MSG="✅ Успешный деплой версии $VERSION";
      else
      MSG="❌ Пайплайн упал в проекте $CI_PROJECT_NAME (ветка $CI_COMMIT_REF_NAME, коммит $CI_COMMIT_SHORT_SHA)";
      fi
    - curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
      -d chat_id="$TG_CHAT_ID" \
      -d text="$MSG"
  needs:
    - deploy
